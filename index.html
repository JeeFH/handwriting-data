<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>数学表达式样本采集</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
          onload="window.__katexReady=true;"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f5f5;--card:#fff;--primary:#0f6efe;--primary-hover:#005a9e;
      --text-primary:#1a1a1a;--text-secondary:#666;--border:#e0e0e0;
      --success:#107c10;--error:#d13438;
    }
    body{
      font-family:'Segoe UI','-apple-system',BlinkMacSystemFont,'Helvetica Neue',sans-serif;
      background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:16px 12px;-webkit-font-smoothing:antialiased;
    }
    .header{text-align:center;margin-bottom:16px}
    .header h1{font-size:18px;font-weight:600;color:var(--text-primary);margin-bottom:4px;letter-spacing:-.3px}
    .header .subtitle{font-size:12px;color:var(--text-secondary);line-height:1.5}
    .card{
      background:var(--card);border-radius:12px;
      box-shadow:0 1.6px 3.6px rgba(0,0,0,.08),0 0.3px 0.9px rgba(0,0,0,.04);
      width:100%;max-width:440px;padding:20px 18px;margin-bottom:14px;border:1px solid var(--border);
    }
    .prompt-box{background:#fafafa;border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center;margin-bottom:14px;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .prompt-label{font-size:11px;color:var(--text-secondary);margin-bottom:8px;font-weight:500}
    .prompt-expr{display:flex;align-items:center;justify-content:center;min-height:48px;font-size:28px;color:var(--text-primary);}
    .prompt-expr .katex{font-size:28px !important}
    .canvas-wrap{position:relative;border-radius:10px;overflow:hidden;margin-bottom:12px}
    canvas{width:100%;aspect-ratio:3/2;background:#fafafa;border:1.5px solid var(--border);border-radius:10px;touch-action:none;cursor:crosshair;display:block;transition:border-color .2s;}
    canvas:active{border-color:var(--primary)}
    .btn-row{display:flex;gap:8px;margin-bottom:12px}
    button{flex:1;padding:11px 0;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .12s;font-family:'Segoe UI',sans-serif;outline:none;}
    button:active{transform:scale(.97)}
    .btn-clear{background:#f0f0f0;color:var(--text-primary);border:1px solid var(--border);}
    .btn-clear:hover{background:#e8e8e8}
    .btn-submit{background:var(--primary);color:#fff;box-shadow:0 1.6px 3.6px rgba(15,110,254,.25);}
    .btn-submit:hover{background:var(--primary-hover)}
    .btn-submit:active{transform:scale(.97);box-shadow:none}
    .btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
    .status{text-align:center;font-size:12.5px;padding:9px 14px;border-radius:8px;margin-bottom:10px;min-height:38px;display:flex;align-items:center;justify-content:center;font-weight:500;transition:all .25s;}
    .status.success{background:#dff6dd;color:var(--success)}
    .status.error{background:#fde7e9;color:var(--error)}
    .status.loading{background:#dbeafe;color:#0f6efe}
    .progress{font-size:11.5px;color:var(--text-secondary);text-align:center;margin-top:8px;font-weight:500}
    .footer{font-size:11px;color:#999;text-align:center;margin-top:6px}
    .share-hint{background:rgba(15,110,254,.06);border:1px solid rgba(15,110,254,.12);color:var(--text-secondary);border-radius:10px;padding:12px 14px;font-size:11.5px;text-align:center;line-height:1.6;max-width:440px;margin-bottom:12px;}
    .dev-stats{font-size:11px;color:var(--text-secondary);text-align:center;margin-bottom:8px;font-weight:500;}

    /* 右上角分享按钮 */
    .share-btn{position:fixed;top:14px;right:14px;z-index:50;background:#fff;border:1px solid var(--border);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;box-shadow:0 1.6px 3.6px rgba(0,0,0,.08);cursor:pointer;font-size:18px;transition:background .15s,transform .12s;}
    .share-btn:hover{background:#f5f5f5;transform:scale(1.08)}
    .share-btn:active{transform:scale(.95)}
    .share-toast{position:fixed;top:58px;right:14px;z-index:51;background:#1a1a1a;color:#fff;font-size:12px;font-weight:500;padding:6px 12px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;}
    .share-toast.show{opacity:1}

    /* 激励弹窗（每10次）*/
    .celebrate-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px);animation:fadeIn .3s;}
    .celebrate-box{background:#fff;border-radius:16px;padding:28px 24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .35s;max-width:360px;width:88%;}
    .celebrate-box .emoji{font-size:48px;margin-bottom:12px}
    .celebrate-box .msg{font-size:15px;font-weight:600;color:var(--text-primary);line-height:1.5}
    .celebrate-box .sub{font-size:12px;color:var(--text-secondary);margin-top:8px}

    /* 里程碑弹窗 */
    .milestone-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);animation:fadeIn .3s;}
    .milestone-box{background:#fff;border-radius:16px;padding:32px 28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.22);animation:popIn .4s;max-width:360px;width:88%;}
    .milestone-box .icon{font-size:56px;margin-bottom:14px}
    .milestone-box .num{font-size:32px;font-weight:700;color:var(--primary);margin-bottom:6px}
    .milestone-box .msg{font-size:15px;font-weight:600;color:var(--text-primary);line-height:1.5;margin-bottom:8px}
    .milestone-box .sub{font-size:12px;color:var(--text-secondary);line-height:1.5}
    .milestone-box button{margin-top:18px;padding:11px 32px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Segoe UI',sans-serif;transition:background .12s;}
    .milestone-box button:hover{background:var(--primary-hover)}

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes popIn{0%{opacity:0;transform:scale(.85)}60%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>

<!-- 右上角分享按钮 -->
<button class="share-btn" id="shareBtn" onclick="copyShareLink()" title="复制分享链接">🔗</button>
<div class="share-toast" id="shareToast">已复制！</div>

<div class="dev-stats" id="dev-stats"></div>

<div class="header">
  <h1>数学表达式样本采集</h1>
  <p class="subtitle">请按照上方表达式的样子，在下方手写区域书写</p>
</div>

<div class="card">
  <div class="prompt-box">
    <div class="prompt-label">请手写这个表达式：</div>
    <div class="prompt-expr" id="pt"></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="cv"></canvas>
  </div>

  <div class="btn-row">
    <button class="btn-clear" onclick="clr()">清空重画</button>
    <button class="btn-submit" id="sb" onclick="sub()">提交</button>
  </div>

  <div class="status" id="st"></div>
  <div class="progress" id="pg">
  <a href="javascript:void(0)" onclick="resetAll()" style="color:#0f6efe;text-decoration:underline;font-size:11px">重置所有进度</a>
</div>
</div>

<div class="share-hint">💡 邀请朋友一起参与，帮助研究进展更快！<br>点击右上角 🔗 分享给朋友</div>
<p class="footer">数据仅用于学术研究 · 完全匿名 · 感谢您的参与 🙏</p>


<!-- 激励弹窗（每10次随机出现）-->
<div class="celebrate-overlay" id="celebrate" style="display:none">
  <div class="celebrate-box">
    <div class="emoji" id="cel-emoji"></div>
    <div class="msg" id="cel-msg"></div>
    <div class="sub" id="cel-sub"></div>
  </div>
</div>

<!-- 里程碑弹窗 -->
<div class="milestone-overlay" id="milestone" style="display:none">
  <div class="milestone-box">
    <div class="icon" id="ms-icon"></div>
    <div class="num" id="ms-num"></div>
    <div class="msg" id="ms-msg"></div>
    <div class="sub" id="ms-sub"></div>
    <button onclick="closeMilestone()">继续提交 →</button>
  </div>
</div>


<script>
// ===== 配置 =====
const MILESTONES = [25, 50, 100, 500, 1000, 2000];

// ===== 普通激励语库（每10次随机展示）=====
const CELEBRATIONS = [
  { emoji:'🎉', msg:'太棒了！感谢您的贡献！', sub:'已有更多人加入，一起加油～' },
  { emoji:'😊', msg:'提交成功，您真棒！', sub:'每一份样本都很珍贵 💖' },
  { emoji:'🌟', msg:'感谢参与！您的数据很有价值', sub:'继续加油，距离目标又近了一步' },
  { emoji:'🎊', msg:'🎊 恭喜完成一份样本！', sub:'手写识别研究因您而进步' },
  { emoji:'💡', msg:'✨ 已记录，感谢您的贡献', sub:'您的参与让 AI 更懂手写数学' },
  { emoji:'🙏', msg:'🙏 感谢支持认知科学研究', sub:'学术研究的每一步都离不开志愿者' },
  { emoji:'👍', msg:'👍 提交成功，辛苦了！', sub:'稍作休息，也可以继续哦' },
  { emoji:'📊', msg:'📊 数据已保存，谢谢！', sub:'您是第 ' + (Math.floor(Math.random()*1000+500)) + ' 位参与者' },
  { emoji:'🌺', msg:'🌺 感谢您的耐心书写', sub:'高质量样本对研究非常重要' },
  { emoji:'💖', msg:'💖 您的数据已经安全保存', sub:'继续参与还有更多惊喜哦' },
];

// ===== 工具 =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== 状态 =====
let EXPRS = [];           // 从 JSON 加载的全部表达式
let POOL = [];            // 当前待写列表（已过滤已提交 + 打乱）
let IDX = 0;              // POOL 中的当前位置
let DEVICE_ID = '';
let TOTAL = 0;            // 累计提交数（跨会话）

let cp = '', sc = 0, ws = 0, drawing = false, lx = 0, ly = 0;
let C, X;
const $ = id => document.getElementById(id);

// ===== localStorage helpers =====
function getSubmittedIds() {
  try { return new Set(JSON.parse(localStorage.getItem('hw_submitted_ids') || '[]')); }
  catch(e) { return new Set(); }
}
function saveSubmittedIds(set) {
  localStorage.setItem('hw_submitted_ids', JSON.stringify([...set]));
}
function getTotal() {
  return parseInt(localStorage.getItem('hw_total') || '0') || 0;
}
function saveTotal(n) {
  localStorage.setItem('hw_total', String(n));
}

// ===== 构建 POOL（过滤已提交，打乱）=====
function buildPool() {
  const done = getSubmittedIds();
  let remaining = EXPRS.filter(e => !done.has(e.id));
  // 如果全部写完了，清空记录，从头再来
  if (remaining.length === 0) {
    saveSubmittedIds(new Set());
    remaining = EXPRS;
  }
  POOL = shuffle(remaining);
  IDX = 0;
  console.log('✅ POOL 构建完成：' + POOL.length + ' 题待写（已提交 ' + getTotal() + ' 份，done.size=' + done.size + '）');
  // 池子太小时提示用户
  const pg = $('pg');
  if (POOL.length <= 10 && POOL.length > 0) {
    pg.innerHTML = '⚠️ 待写题目仅剩 ' + POOL.length + ' 道，可能含有旧提交记录。<a href="javascript:void(0)" onclick="resetAll()" style="color:#d13438;text-decoration:underline">点击重置进度</a>';
    pg.style.color = '#d13438';
  } else if (POOL.length === 0) {
    pg.innerHTML = '⚠️ 所有题目已提交！<a href="javascript:void(0)" onclick="resetAll()" style="color:#0f6efe;text-decoration:underline">点击重置进度</a>';
    pg.style.color = '#d13438';
  } else {
    pg.innerHTML = '待写 ' + POOL.length + ' 题 | <a href="javascript:void(0)" onclick="resetAll()" style="color:#0f6efe;text-decoration:underline;font-size:11px">重置所有进度</a>';
    pg.style.color = '';
  }
}

// ===== 设备 ID =====
function getDeviceId() {
  let id = localStorage.getItem('hw_device_id');
  if (!id) {
    id = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36);
    localStorage.setItem('hw_device_id', id);
  }
  return id;
}

// ===== 渲染表达式 =====
function pickExpr() {
  console.log('pickExpr: IDX=' + IDX + ' POOL.length=' + POOL.length);
  if (IDX >= POOL.length) buildPool();
  const entry = POOL[IDX];
  cp = entry.latex;
  CURRENT_DIFFICULTY = entry.difficulty || 'unknown';
  renderPrompt(cp);
  $('sb').disabled = false;
  $('sb').textContent = '提交';
}

let CURRENT_DIFFICULTY = '';

function renderPrompt(latexStr) {
  const el = $('pt');
  if (!(window.katex && typeof katex.renderToString === 'function')) {
    let t = 0;
    const poll = setInterval(() => {
      t++;
      if (window.katex && typeof katex.renderToString === 'function') {
        clearInterval(poll);
        renderPrompt(latexStr);
      } else if (t > 30) {
        clearInterval(poll);
        el.textContent = latexStr;
      }
    }, 100);
    return;
  }
  try {
    el.innerHTML = katex.renderToString(latexStr, { displayMode: false, throwOnError: false, output: 'html', strict: false });
  } catch(e) {
    el.textContent = latexStr;
  }
}

// ===== Canvas =====
function initCanvas() {
  C = $('cv');
  X = C.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rc = C.getBoundingClientRect();
  C.width = rc.width * dpr;
  C.height = rc.height * dpr;
  X.scale(dpr, dpr);
  C.style.width = rc.width + 'px';
  C.style.height = rc.height + 'px';
  clr();

  C.addEventListener('touchstart', e => { e.preventDefault(); st(e); }, { passive: false });
  C.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = gp(e); ln(lx, ly, p.x, p.y); lx = p.x; ly = p.y; }, { passive: false });
  C.addEventListener('touchend', () => { drawing = false; X.beginPath(); });
  C.addEventListener('mousedown', e => st(e));
  C.addEventListener('mousemove', e => { if (!drawing) return; const p = gp(e); ln(lx, ly, p.x, p.y); lx = p.x; ly = p.y; });
  C.addEventListener('mouseup', () => { drawing = false; X.beginPath(); });
}

function gp(e) {
  const r = C.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}
function st(e) {
  drawing = true;
  const p = gp(e); lx = p.x; ly = p.y;
  if (!ws) ws = Date.now();
  sc++;
  X.beginPath();
  X.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
  X.fillStyle = '#1a1a2e';
  X.fill();
}
function ln(x1, y1, x2, y2) {
  X.beginPath(); X.moveTo(x1, y1); X.lineTo(x2, y2);
  X.strokeStyle = '#1a1a2e'; X.lineWidth = 2.5; X.lineCap = 'round'; X.lineJoin = 'round'; X.stroke();
}
function clr() {
  const dpr = window.devicePixelRatio || 1;
  X.clearRect(0, 0, C.width / dpr, C.height / dpr);
  X.strokeStyle = '#f0f0f0'; X.lineWidth = 0.5;
  for (let x = 30; x < C.width/dpr; x += 30) { X.beginPath(); X.moveTo(x, 0); X.lineTo(x, C.height/dpr); X.stroke(); }
  for (let y = 30; y < C.height/dpr; y += 30) { X.beginPath(); X.moveTo(0, y); X.lineTo(C.width/dpr, y); X.stroke(); }
  X.beginPath();
  sc = 0; ws = 0;
}

// ===== 提交 =====
async function sub() {
  const st = $('st'), btn = $('sb');

  // 防空白提交：笔画数
  if (sc === 0) { st.className = 'status error'; st.textContent = '⚠️ 请先手写再提交'; return; }
  // 防空白提交：像素扫描（忽略浅灰网格线 #f0f0f0）
  const idata = X.getImageData(0, 0, C.width, C.height);
  let ok = false;
  for (let i = 0; i < idata.data.length; i += 4) {
    if (idata.data[i+3] > 0) {
      const [r, g, b] = [idata.data[i], idata.data[i+1], idata.data[i+2]];
      if (!(r > 230 && g > 230 && b > 230)) { ok = true; break; }
    }
  }
  if (!ok) { st.className = 'status error'; st.textContent = '⚠️ 请先手写再提交'; return; }

  st.className = 'status loading';
  st.textContent = '⏳ 提交中...';
  btn.disabled = true;

  const b64 = C.toDataURL('image/png');
  const dur = ws ? Date.now() - ws : 0;
  const scCopy = sc;
  const diff = CURRENT_DIFFICULTY;
  const exprId = POOL[IDX] ? POOL[IDX].id : 0;

  // 更新累计数 + 已提交 ID
  TOTAL = getTotal() + 1;
  saveTotal(TOTAL);
  const done = getSubmittedIds();
  done.add(exprId);
  saveSubmittedIds(done);

  // 更新难度统计
  if (diff === 'simple') { let s = JSON.parse(localStorage.getItem('hw_stats')||'{}'); s.simple=(s.simple||0)+1; localStorage.setItem('hw_stats', JSON.stringify(s)); }
  else if (diff === 'normal') { let s = JSON.parse(localStorage.getItem('hw_stats')||'{}'); s.normal=(s.normal||0)+1; localStorage.setItem('hw_stats', JSON.stringify(s)); }
  else if (diff === 'complex') { let s = JSON.parse(localStorage.getItem('hw_stats')||'{}'); s.complex=(s.complex||0)+1; localStorage.setItem('hw_stats', JSON.stringify(s)); }
  updateDevStats();

  // 推进
  IDX++;
  clr();

  // 异步上传（放前面，确保里程碑时也上传）
  fetch('/api/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: cp, imageBase64: b64, strokeCount: scCopy, writeDuration: dur, deviceId: DEVICE_ID, difficulty: diff })
  }).then(r => { if (!r.ok) console.warn('上传失败', r.status); })
    .catch(e => console.warn('上传失败', e));

  // 里程碑检查（额外弹窗，不阻塞上传）
  if (MILESTONES.includes(TOTAL)) {
    showMilestone(TOTAL);
    return;
  }

  // 普通流程：显示随机激励弹窗（每10次）
  showCelebration(TOTAL);

  // 加载下一题
  pickExpr();
  btn.disabled = false;
  st.className = 'status'; st.textContent = '';
}

// ===== 普通激励弹窗（每10次）=====
function showCelebration(n) {
  if (n % 10 !== 0) return;
  const cel = CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)];
  $('cel-emoji').textContent = cel.emoji;
  $('cel-msg').textContent = cel.msg;
  $('cel-sub').textContent = cel.sub;
  $('celebrate').style.display = 'flex';
  setTimeout(() => { $('celebrate').style.display = 'none'; }, 1000);
}

// ===== 里程碑弹窗 =====
function showMilestone(n) {
  const msgs = {
    25:  { icon: '🎉', msg: '已提交 25 份！太棒了！', sub: '已经积累了第一批珍贵数据，继续加油～' },
    50:  { icon: '🌟', msg: '50 份里程碑！', sub: '你的贡献让模型训练更稳健' },
    100: { icon: '🏆', msg: '100 份！你是超级贡献者！', sub: '研究进度因你大幅推进 🚀' },
    500: { icon: '💎', msg: '500 份！难以置信！', sub: '你已经是顶级贡献者了，谢谢！' },
    1000:{ icon: '🏅', msg: '1000 份！传奇级贡献！', sub: '手写数学表达式数据集因你而诞生 🎊' },
    2000:{ icon: '🏅', msg: '2000 份！你创造了纪录！', sub: '请务必联系我们，有惊喜给你 🎁' },
  };
  const m = msgs[n] || { icon: '🎉', msg: '里程碑 ' + n, sub: '感谢你的坚持！' };
  $('ms-icon').textContent = m.icon;
  $('ms-num').textContent = n + ' 份';
  $('ms-msg').textContent = m.msg;
  $('ms-sub').textContent = m.sub;
  $('milestone').style.display = 'flex';
}

function closeMilestone() {
  $('milestone').style.display = 'none';
  // 里程碑弹窗关闭后，显示普通激励（如果这次提交也满足每10次条件）
  showCelebration(TOTAL);
  // 异步上传
  pickExpr();
  $('st').className = 'status'; $('st').textContent = '';
  $('sb').disabled = false;
}

function updateDevStats() {
  const el = $('dev-stats');
  if (!el) return;
  try {
    const s = JSON.parse(localStorage.getItem('hw_stats') || '{}');
    el.textContent = '简单:' + (s.simple||0) + ' 普通:' + (s.normal||0) + ' 复杂:' + (s.complex||0) + '  |  累计:' + getTotal();
  } catch(e) {
    el.textContent = '累计:' + getTotal();
  }
}

// ===== 重置所有进度 =====
function resetAll() {
  if (!confirm('确定要重置所有进度吗？\n\n将清空：提交记录、累计计数、设备ID\n\n此操作不可撤销！')) return;
  localStorage.removeItem('hw_submitted_ids');
  localStorage.removeItem('hw_total');
  localStorage.removeItem('hw_device_id');
  localStorage.removeItem('hw_stats');
  location.reload();
}

// ===== 分享 =====
function copyShareLink() {
  const url = location.origin + location.pathname;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => showShareToast()).catch(() => fallbackCopy(url));
  } else { fallbackCopy(url); }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showShareToast(); } catch(e) { prompt('复制此链接：', text); }
  document.body.removeChild(ta);
}
function showShareToast() {
  const t = $('shareToast'); t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

// ===== 加载表达式库 =====
async function loadExprs() {
  try {
    const r = await fetch('expression-library/expressions.json?v='+Date.now());
    EXPRS = await r.json();
    console.log('✅ 表达式库加载：' + EXPRS.length + ' 条');
  } catch(e) {
    console.warn('使用内置表达式', e);
    EXPRS = [
      {id:1, latex:'2 + 3', difficulty:'simple'},
      {id:2, latex:'5 \\times 4', difficulty:'simple'},
      {id:3, latex:'\\sqrt{16}', difficulty:'normal'},
      {id:4, latex:'\\frac{1}{2} + \\frac{3}{4}', difficulty:'normal'},
      {id:5, latex:'\\cos(30)', difficulty:'simple'},
    ];
  }
  DEVICE_ID = getDeviceId();
  TOTAL = getTotal();
  updateDevStats();
  buildPool();
  pickExpr();
  initCanvas();
}

// ===== 初始化 =====
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => loadExprs());
} else {
  loadExprs();
}
</script>
