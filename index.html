<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>数学表达式样本采集</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
          onload="window.__katexReady=true;"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f5f5;
      --card:#fff;
      --primary:#0f6efe;
      --primary-hover:#005a9e;
      --text-primary:#1a1a1a;
      --text-secondary:#666;
      --border:#e0e0e0;
      --success:#107c10;
      --error:#d13438;
      --warning:#ffb900;
    }
    body{
      font-family:'Segoe UI','-apple-system',BlinkMacSystemFont,'Helvetica Neue',sans-serif;
      background:var(--bg);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:16px 12px;
      -webkit-font-smoothing:antialiased;
    }

    .header{text-align:center;margin-bottom:16px}
    .header h1{font-size:18px;font-weight:600;color:var(--text-primary);margin-bottom:4px;letter-spacing:-.3px}
    .header .subtitle{font-size:12px;color:var(--text-secondary);line-height:1.5}

    .card{
      background:var(--card);
      border-radius:12px;
      box-shadow:0 1.6px 3.6px rgba(0,0,0,.08), 0 0.3px 0.9px rgba(0,0,0,.04);
      width:100%;max-width:440px;
      padding:20px 18px;
      margin-bottom:14px;
      border:1px solid var(--border);
      transition:box-shadow .2s;
    }
    .card:hover{
      box-shadow:0 3.6px 7.2px rgba(0,0,0,.1), 0 0.9px 1.8px rgba(0,0,0,.05);
    }

    /* 表达式展示区 */
    .prompt-box{
      background:#fafafa;
      border:1px solid var(--border);
      border-radius:10px;
      padding:14px 12px;
      text-align:center;
      margin-bottom:14px;
      min-height:80px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    .prompt-label{font-size:11px;color:var(--text-secondary);margin-bottom:8px;font-weight:500}
    .prompt-expr{
      display:flex;align-items:center;justify-content:center;
      min-height:48px;
      font-size:28px;
      color:var(--text-primary);
    }
    .prompt-expr .katex{font-size:28px !important}

    /* 手写区域 */
    .canvas-wrap{position:relative;border-radius:10px;overflow:hidden;margin-bottom:12px}
    canvas{
      width:100%;aspect-ratio:3/2;
      background:#fafafa;
      border:1.5px solid var(--border);
      border-radius:10px;
      touch-action:none;cursor:crosshair;display:block;
      transition:border-color .2s;
    }
    canvas:active{border-color:var(--primary)}

    /* 按钮 */
    .btn-row{display:flex;gap:8px;margin-bottom:12px}
    button{
      flex:1;padding:11px 0;
      border:none;border-radius:8px;
      font-size:14px;font-weight:600;
      cursor:pointer;transition:all .12s;
      font-family:'Segoe UI',sans-serif;
      outline:none;
    }
    button:active{transform:scale(.97)}
    .btn-clear{
      background:#f0f0f0;color:var(--text-primary);
      border:1px solid var(--border);
    }
    .btn-clear:hover{background:#e8e8e8}
    .btn-submit{
      background:var(--primary);color:#fff;
      box-shadow:0 1.6px 3.6px rgba(15,110,254,.25);
    }
    .btn-submit:hover{background:var(--primary-hover);box-shadow:0 3.6px 7.2px rgba(15,110,254,.3)}
    .btn-submit:active{transform:scale(.97);box-shadow:none}
    .btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

    /* 状态提示 */
    .status{
      text-align:center;font-size:12.5px;
      padding:9px 14px;border-radius:8px;
      margin-bottom:10px;min-height:38px;
      display:flex;align-items:center;justify-content:center;
      font-weight:500;transition:all .25s;
    }
    .status.success{background:#dff6dd;color:var(--success)}
    .status.error{background:#fde7e9;color:var(--error)}
    .status.loading{background:#dbeafe;color:#0f6efe}

    .progress{font-size:11.5px;color:var(--text-secondary);text-align:center;margin-top:8px;font-weight:500}
    .counter{font-size:11.5px;color:var(--text-secondary);text-align:center;margin-bottom:8px;font-weight:500}

    .footer{font-size:11px;color:#999;text-align:center;margin-top:6px}
    .share-hint{
      background:rgba(15,110,254,.06);
      border:1px solid rgba(15,110,254,.12);
      color:var(--text-secondary);
      border-radius:10px;padding:12px 14px;
      font-size:11.5px;text-align:center;line-height:1.6;
      max-width:440px;margin-bottom:12px;
    }

    /* 弹窗 */
    .modal-overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.35);
      display:flex;align-items:center;justify-content:center;
      z-index:100;backdrop-filter:blur(4px);
      animation:fadeIn .2s;
    }
    .modal{
      background:#fff;border-radius:14px;
      padding:24px 20px;max-width:400px;width:92%;
      box-shadow:0 16px 48px rgba(0,0,0,.18);
      animation:slideUp .25s;
      max-height:85vh;overflow-y:auto;
    }
    .modal h2{font-size:17px;font-weight:600;color:var(--text-primary);margin-bottom:12px}
    .modal p{font-size:13px;color:var(--text-secondary);line-height:1.65;margin-bottom:10px}
    .modal .example-box{
      background:#fafafa;border:1px solid var(--border);
      border-left:3.5px solid var(--primary);
      border-radius:8px;padding:12px;margin:12px 0;
    }
    .modal .example-box .label{font-size:11px;color:var(--text-secondary);margin-bottom:5px;font-weight:500}
    .modal .example-box .expr{font-size:20px;font-weight:600;color:var(--text-primary)}
    .modal .tip{
      font-size:11.5px;color:var(--text-secondary);
      background:rgba(255,185,0,.1);border:1px solid rgba(255,185,0,.2);
      padding:9px 12px;border-radius:8px;line-height:1.6;margin-top:10px;
    }
    .modal button{
      width:100%;margin-top:14px;padding:12px;
      background:var(--primary);color:#fff;
      border:none;border-radius:8px;font-size:14px;font-weight:600;
      cursor:pointer;transition:all .12s;font-family:'Segoe UI',sans-serif;
    }
    .modal button:hover{background:var(--primary-hover)}
    .modal button:active{transform:scale(.97)}

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* 激励弹窗 */
    .celebrate-overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.3);
      display:flex;align-items:center;justify-content:center;
      z-index:200;backdrop-filter:blur(3px);
      animation:fadeIn .3s;
    }
    .celebrate-box{
      background:#fff;border-radius:16px;
      padding:28px 24px;text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.2);
      animation:popIn .35s;
      max-width:360px;width:88%;
    }
    .celebrate-box .emoji{font-size:48px;margin-bottom:12px}
    .celebrate-box .msg{font-size:15px;font-weight:600;color:var(--text-primary);line-height:1.5}
    .celebrate-box .sub{font-size:12px;color:var(--text-secondary);margin-top:8px}

    @keyframes popIn{
      0%{opacity:0;transform:scale(.85)}
      60%{transform:scale(1.03)}
      100%{opacity:1;transform:scale(1)}
    }

    .dev-stats{
      font-size:11px;
      color:var(--text-secondary);
      text-align:center;
      margin-bottom:2px;
      font-weight:500;
    }
    .group-display{
      font-size:12px;
      color:var(--primary);
      text-align:center;
      margin-bottom:8px;
      font-weight:600;
    }
  </style>
</head>
<body>

<div class="counter" id="counter"></div>
<div class="dev-stats" id="dev-stats"></div>
<div class="group-display" id="group-display"></div>

<div class="header">
  <h1>数学表达式样本采集</h1>
  <p class="subtitle">请按照上方表达式的样子，在下方手写区域书写</p>
</div>

<div class="card">
  <div class="prompt-box">
    <div class="prompt-label">请手写这个表达式：</div>
    <div class="prompt-expr" id="pt"></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="cv"></canvas>
  </div>

  <div class="btn-row">
    <button class="btn-clear" onclick="clr()">清空重画</button>
    <button class="btn-submit" id="sb" onclick="sub()">提交</button>
  </div>

  <div class="status" id="st"></div>
  <div class="progress" id="pg"></div>
</div>

<div class="share-hint">💡 邀请朋友一起参与，帮助研究进展更快！<br>点击右上角 ··· 分享到聊天或朋友圈</div>
<p class="footer">数据仅用于学术研究 · 完全匿名 · 感谢您的参与 🙏</p>


<!-- 书写说明弹窗 -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h2>📝 书写说明</h2>
    <p>请根据上方显示的 LaTeX 表达式，在手写区域<strong>按相同格式</strong>书写。</p>
    <div class="example-box">
      <div class="label">LaTeX 示例：</div>
      <div class="expr">\cos(30) + \sqrt{2}</div>
    </div>
    <p>书写时注意：</p>
    <p>① <strong>等号 =</strong> 需要写（即使示例中显示 <code>=</code>）<br>
       ② <strong>括号</strong>按示例写，不要省略<br>
       ③ 尽量清晰书写，与平时手写习惯一致</p>
    <div class="tip">💡 每份样本约需 10 秒，共 2–3 分钟即可完成。数据完全匿名，仅用于学术研究。</div>
    <button onclick="closeModal()">开始参与 →</button>
  </div>
</div>


<!-- 激励弹窗（提交后随机出现）-->
<div class="celebrate-overlay" id="celebrate" style="display:none">
  <div class="celebrate-box">
    <div class="emoji" id="cel-emoji"></div>
    <div class="msg" id="cel-msg"></div>
    <div class="sub" id="cel-sub"></div>
  </div>
</div>


<script>
// ===== 分组逻辑 =====
function seededRandom(seed) {
  let s = seed | 0;
  return function() {
    s = s ^ (s << 13);
    s = s ^ (s >>> 17);
    s = s ^ (s << 5);
    return (s >>> 0) / 4294967296;
  };
}

function getSeedFromDeviceId(deviceId) {
  let seed = 0;
  for (let i = 0; i < deviceId.length; i++) {
    seed = ((seed << 5) - seed) + deviceId.charCodeAt(i);
    seed = seed | 0;
  }
  return Math.abs(seed);
}

function shuffleWithSeed(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function createGroups(allExprs, deviceId) {
  const pools = { simple: [], normal: [], complex: [] };
  allExprs.forEach(e => {
    const d = e.difficulty || '';
    if (pools[d]) pools[d].push(e);
  });

  const seed = getSeedFromDeviceId(deviceId);
  const rng = seededRandom(seed);
  const shuffledPools = {};
  for (const k in pools) {
    shuffledPools[k] = shuffleWithSeed(pools[k], rng);
  }

  const groups = [];
  let idx = { simple: 0, normal: 0, complex: 0 };
  while (idx.simple + 3 <= shuffledPools.simple.length &&
         idx.normal + 5 <= shuffledPools.normal.length &&
         idx.complex + 2 <= shuffledPools.complex.length) {
    const group = [
      ...shuffledPools.simple.slice(idx.simple, idx.simple + 3),
      ...shuffledPools.normal.slice(idx.normal, idx.normal + 5),
      ...shuffledPools.complex.slice(idx.complex, idx.complex + 2),
    ];
    const grng = seededRandom(seed + groups.length);
    const shuffledGroup = shuffleWithSeed(group, grng);
    groups.push(shuffledGroup);
    idx.simple += 3;
    idx.normal += 5;
    idx.complex += 2;
  }
  return groups;
}

// ===== 表达式库（从 JSON 加载）=====
let EXPRS = [];
let GROUPS = [];
let GROUP_IDX = 0;
let EXPR_IN_GROUP = 0;
let DEVICE_ID = '';
let DEVICE_STATS = { simple: 0, normal: 0, complex: 0 };
let CURRENT_DIFFICULTY = '';

// ===== 激励语库 =====
const CELEBRATIONS = [
  { emoji:'🎉', msg:'太棒了！感谢您的贡献！', sub:'已有更多人加入，一起加油～' },
  { emoji:'😊', msg:'提交成功，您真棒！', sub:'每一份样本都很珍贵 💖' },
  { emoji:'🌟', msg:'感谢参与！您的数据很有价值', sub:'继续加油，距离目标又近了一步' },
  { emoji:'🎊', msg:'🎊 恭喜完成一份样本！', sub:'手写识别研究因您而进步' },
  { emoji:'💡', msg:'✨ 已记录，感谢您的贡献', sub:'您的参与让 AI 更懂手写数学' },
  { emoji:'🙏', msg:'🙏 感谢支持认知科学研究', sub:'学术研究的每一步都离不开志愿者' },
  { emoji:'👍', msg:'👍 提交成功，辛苦了！', sub:'稍作休息，也可以继续哦' },
  { emoji:'📊', msg:'📊 数据已保存，谢谢！', sub:'您是第 ' + (()=>Math.floor(Math.random()*1000+500))() + ' 位参与者' },
  { emoji:'🌺', msg:'🌺 感谢您的耐心书写', sub:'高质量样本对研究非常重要' },
  { emoji:'💖', msg:'💖 您的数据已经安全保存', sub:'继续参与还有更多惊喜哦' },
];

// ===== 设备标识与统计 =====
function getDeviceId() {
  let id = localStorage.getItem('hw_device_id');
  if (!id) {
    id = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36);
    localStorage.setItem('hw_device_id', id);
  }
  return id;
}

function loadDeviceStats() {
  const raw = localStorage.getItem('hw_device_stats');
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      // 兼容旧格式：确保三个字段都存在，缺失的默认为0
      DEVICE_STATS = {
        simple: Number(parsed.simple) || 0,
        normal: Number(parsed.normal) || 0,
        complex: Number(parsed.complex) || 0
      };
    } catch(e) {
      DEVICE_STATS = { simple: 0, normal: 0, complex: 0 };
    }
  }
}

function saveDeviceStats() {
  localStorage.setItem('hw_device_stats', JSON.stringify(DEVICE_STATS));
}

function updateDeviceStats(difficulty) {
  if (difficulty === 'simple') DEVICE_STATS.simple++;
  else if (difficulty === 'normal') DEVICE_STATS.normal++;
  else if (difficulty === 'complex') DEVICE_STATS.complex++;
  else console.warn('updateDeviceStats: unknown difficulty:', difficulty);
  saveDeviceStats();
}

function renderDeviceStats() {
  const el = document.getElementById('dev-stats');
  if (!el) return;
  el.textContent = '简单:' + DEVICE_STATS.simple + ' 普通:' + DEVICE_STATS.normal + ' 复杂:' + DEVICE_STATS.complex;
}
function updateGroupDisplay(){
  const el = document.getElementById('group-display');
  if (!el) return;
  if (GROUP_IDX >= GROUPS.length) {
    el.textContent = '已完成全部 ' + GROUPS.length + ' 组';
    return;
  }
  el.textContent = '第 ' + (GROUP_IDX + 1) + '/' + GROUPS.length + ' 组 · 第 ' + (EXPR_IN_GROUP + 1) + '/' + GROUPS[GROUP_IDX].length + ' 题';
}


let cp = '', sc = 0, ws = 0, draw = false, lx = 0, ly = 0;
let C, X;

const $ = id => document.getElementById(id);

// ===== 加载表达式库 =====
async function loadExprs(){
  try {
    const r = await fetch('expression-library/expressions.json?v='+Date.now());
    EXPRS = await r.json();
    console.log('✅ 表达式库加载成功：' + EXPRS.length + ' 条');

    DEVICE_ID = getDeviceId();
    loadDeviceStats();

    GROUPS = createGroups(EXPRS, DEVICE_ID);
    if (GROUPS.length === 0) {
      console.warn('createGroups 返回 0 组，使用 fallback');
      GROUPS = [EXPRS];
    }
    console.log('✅ 分组完成：' + GROUPS.length + ' 组');

    GROUP_IDX = parseInt(localStorage.getItem('hw_group_idx') || '0') || 0;
    EXPR_IN_GROUP = parseInt(localStorage.getItem('hw_expr_in_group') || '0') || 0;

    // 已完成全部组 → 显示完成消息，不重置进度
    if (GROUP_IDX > GROUPS.length) {
      GROUP_IDX = GROUPS.length;
    }
    if (GROUP_IDX === GROUPS.length) {
      // 全部完成，保留状态供 pickExpr() 显示完成消息
    } else {
      // 正常情况：clamp 到合法范围
      if (GROUP_IDX < 0) GROUP_IDX = 0;
      if (EXPR_IN_GROUP < 0) EXPR_IN_GROUP = 0;
      const gLen = GROUPS[GROUP_IDX] ? GROUPS[GROUP_IDX].length : 0;
      if (EXPR_IN_GROUP >= gLen) { EXPR_IN_GROUP = 0; }
    }

    renderDeviceStats();
    updateGroupDisplay();
    pickExpr();
    initCanvas();
  } catch(e) {
    console.error('❌ 加载表达式库失败，使用内置数据', e);
    EXPRS = [
      {id:1, latex:'2 + 3', difficulty:'simple'},
      {id:2, latex:'5 \\times 4', difficulty:'simple'},
      {id:3, latex:'\\sqrt{16}', difficulty:'normal'},
      {id:4, latex:'\\frac{1}{2} + \\frac{3}{4}', difficulty:'normal'},
      {id:5, latex:'\\cos(30)', difficulty:'simple'},
      {id:6, latex:'12 - 5', difficulty:'simple'},
      {id:7, latex:'\\sin(45)', difficulty:'normal'},
      {id:8, latex:'3 \\times 7 + 2', difficulty:'normal'},
      {id:9, latex:'\\sqrt{25} + 10', difficulty:'normal'},
      {id:10, latex:'\\frac{2}{3} - \\frac{1}{6}', difficulty:'complex'},
    ];
    DEVICE_ID = getDeviceId();
    loadDeviceStats();
    // 不用 createGroups，直接做一组
    GROUPS = [EXPRS];
    // fallback 数据只有 1 组，不恢复线上进度，直接重置
    GROUP_IDX = 0;
    EXPR_IN_GROUP = 0;
    renderDeviceStats();
    updateGroupDisplay();
    pickExpr();
    initCanvas();
  }
}
function pickExpr(){
  if (GROUP_IDX >= GROUPS.length) {
    $('pt').textContent = '已全部完成，感谢参与！';
    cp = '';
    CURRENT_DIFFICULTY = '';
    return;
  }
  const entry = GROUPS[GROUP_IDX][EXPR_IN_GROUP];
  cp = entry.latex;
  CURRENT_DIFFICULTY = entry.difficulty || 'unknown';
  renderPrompt(cp);
  updateGroupDisplay();
}

function renderPrompt(latexStr){
  const el = $('pt');
  // 如果 KaTeX 还没加载好，最多等 3 秒
  if (!(window.katex && typeof katex.renderToString === 'function')) {
    let attempts = 0;
    const poll = setInterval(() => {
      attempts++;
      if (window.katex && typeof katex.renderToString === 'function') {
        clearInterval(poll);
        renderPrompt(latexStr);
      } else if (attempts > 30) {
        clearInterval(poll);
        el.textContent = latexStr;
      }
    }, 100);
    return;
  }
  try {
    el.innerHTML = katex.renderToString(latexStr, {
      displayMode: false,
      throwOnError: false,
      output: 'html',
      strict: false
    });
  } catch(e) {
    el.textContent = latexStr;
  }
}


// ===== 画布初始化 =====
function initCanvas(){
  C = document.getElementById('cv');
  X = C.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rc = C.getBoundingClientRect();
  C.width = rc.width * dpr;
  C.height = rc.height * dpr;
  X.scale(dpr, dpr);
  C.style.width = rc.width + 'px';
  C.style.height = rc.height + 'px';
  clr();

  C.addEventListener('touchstart', e => { e.preventDefault(); st(e); }, { passive: false });
  C.addEventListener('touchmove', e => { e.preventDefault(); if(!draw) return; const p = gp(e); ln(lx, ly, p.x, p.y); lx = p.x; ly = p.y; }, { passive: false });
  C.addEventListener('touchend', () => { draw = false; X.beginPath(); });
  C.addEventListener('mousedown', e => st(e));
  C.addEventListener('mousemove', e => { if(!draw) return; const p = gp(e); ln(lx, ly, p.x, p.y); lx = p.x; ly = p.y; });
  C.addEventListener('mouseup', () => { draw = false; X.beginPath(); });
}

function gp(e){
  const r = C.getBoundingClientRect();
  return {
    x: (e.touches ? e.touches[0].clientX : e.clientX) - r.left,
    y: (e.touches ? e.touches[0].clientY : e.clientY) - r.top
  };
}

function st(e){
  draw = true;
  const p = gp(e);
  lx = p.x; ly = p.y;
  if(!ws) ws = Date.now();
  sc++;
  // 画单点（支持单点输入，如小数点）
  X.beginPath();
  X.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
  X.fillStyle = '#1a1a2e';
  X.fill();
}

function ln(x1, y1, x2, y2){
  X.beginPath();
  X.moveTo(x1, y1);
  X.lineTo(x2, y2);
  X.strokeStyle = '#1a1a2e';
  X.lineWidth = 2.5;
  X.lineCap = 'round';
  X.lineJoin = 'round';
  X.stroke();
}

function clr(){
  const dpr = window.devicePixelRatio || 1;
  X.clearRect(0, 0, C.width / dpr, C.height / dpr);
  // 浅灰网格
  X.strokeStyle = '#f0f0f0';
  X.lineWidth = 0.5;
  for(let x = 30; x < C.width/dpr; x += 30){ X.beginPath(); X.moveTo(x,0); X.lineTo(x, C.height/dpr); X.stroke(); }
  for(let y = 30; y < C.height/dpr; y += 30){ X.beginPath(); X.moveTo(0,y); X.lineTo(C.width/dpr, y); X.stroke(); }
  X.beginPath();
  sc = 0; ws = 0;
}

function closeModal(){
  localStorage.setItem('hw_survey_seen', '1');
  $('modal').style.display = 'none';
}

// ===== 提交 =====
async function sub(){
  const st = $('st'), btn = $('sb');

  // 检测是否有内容
  const dpr = window.devicePixelRatio || 1;
  const idata = X.getImageData(0, 0, C.width, C.height);
  let ok = false;
  for(let i = 3; i < idata.data.length; i += 4) if(idata.data[i] > 0){ ok = true; break; }
  if(!ok){ st.className = 'status error'; st.textContent = '⚠️ 请先手写再提交'; return; }

  st.className = 'status loading';
  st.textContent = '⏳ 提交中...';  btn.disabled = true;

  // 先读取画布和笔画数据，再清除
  const b64 = C.toDataURL('image/png');
  const dur = ws ? Date.now() - ws : 0;
  const scCopy = sc;
  const submittedDifficulty = CURRENT_DIFFICULTY;

  // 更新统计
  updateDeviceStats(submittedDifficulty);
  renderDeviceStats();

  // 推进组内进度
  EXPR_IN_GROUP++;
  const currentGroup = GROUPS[GROUP_IDX];
  if (!currentGroup || EXPR_IN_GROUP >= currentGroup.length) {
    GROUP_IDX++;
    EXPR_IN_GROUP = 0;
    if (GROUP_IDX >= GROUPS.length) {
      $('pt').textContent = '已全部完成，感谢参与！';
      st.className = 'status success'; st.textContent = '🎉 全部完成！';
      btn.disabled = true;
      localStorage.setItem('hw_group_idx', GROUP_IDX);
      return;
    }
  }
  localStorage.setItem('hw_group_idx', GROUP_IDX);
  localStorage.setItem('hw_expr_in_group', EXPR_IN_GROUP);
  updateGroupDisplay();

  // 清屏并加载下一题
  clr();
  pickExpr();

  // 已提交数量
  const n = parseInt(new URLSearchParams(location.search).get('n') || '0') + 1;
  history.replaceState(null, '', '?n=' + n);
  updateCounter();

  // 显示激励
  showCelebration(n);

  btn.disabled = false;

  // 后端异步上传
  fetch('/api/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: cp, imageBase64: b64, strokeCount: scCopy, writeDuration: dur, deviceId: DEVICE_ID, difficulty: submittedDifficulty })
  }).then(r => {
    if(!r.ok) console.warn('上传失败', r.status);
  }).catch(e => console.warn('上传失败', e));

  setTimeout(() => { st.className = 'status'; st.textContent = ''; }, 1500);
}


// ===== 激励弹窗 =====
function showCelebration(n){
  // 每 3 次提交显示一次激励
  if (n % 3 !== 0 && n > 0) return;

  const cel = CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)];
  $('cel-emoji').textContent = cel.emoji;
  $('cel-msg').textContent = cel.msg;
  $('cel-sub').textContent = cel.sub.replace('__N__', n);
  $('celebrate').style.display = 'flex';

  setTimeout(() => {
    $('celebrate').style.display = 'none';
  }, 2200);
}

function updateCounter(){
  const n = parseInt(new URLSearchParams(location.search).get('n') || '0');
  const c = $('counter');
  if (n > 0) c.textContent = '已提交 ' + n + ' 份';
  else c.textContent = '';
}

// ===== 初始化 =====
function init(){
  // 弹窗逻辑
  if (!localStorage.getItem('hw_survey_seen')) {
    $('modal').style.display = 'flex';
  }
  updateCounter();
  loadExprs();
}

// DOMContentLoaded 后初始化，确保 DOM 已就绪
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
